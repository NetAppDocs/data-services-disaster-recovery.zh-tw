indexpage:
  title: NetApp Disaster Recovery文檔
  summary: 透過 NetApp Disaster Recovery，您可以將執行 ONTAP 儲存的內部部署 VMware 工作負載複製到公有雲中的 VMware
    軟體定義資料中心，作為災難復原站點，並使用 NetApp 雲端儲存。
  keywords: disaster, disaster recovery, bluexp, replicate, replication, cloud storage
  lead: 災難復原至雲端是一種彈性且經濟高效的方式，可保護工作負載免受站台中斷和資料毀損事件（例如勒索軟體）的影響。透過 NetApp Disaster Recovery，您可以將執行
    ONTAP 儲存設備的內部部署 VMware 工作負載複寫到公有雲中的 VMware 軟體定義資料中心，或複寫到另一個內部部署站台作為災難復原站台。
